<!DOCTYPE html>
<html>
<head>
    <title>PWA Icon Generator</title>
</head>
<body>
    <h1>PWA Icon Generator</h1>
    <p>This will generate placeholder icons for your PWA. Open this file in a browser and click the buttons.</p>
    
    <canvas id="canvas192" width="192" height="192" style="border:1px solid #000; margin: 10px;"></canvas>
    <button onclick="download192()">Download 192x192</button>
    
    <canvas id="canvas512" width="512" height="512" style="border:1px solid #000; margin: 10px;"></canvas>
    <button onclick="download512()">Download 512x512</button>

    <script>
        function drawIcon(canvas, size) {
            const ctx = canvas.getContext('2d');
            
            // Background - black like the SVG icon
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, size, size);
            
            // Text
            ctx.fillStyle = '#ffffff';
            ctx.font = `bold ${size * 0.3}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('UOMe', size / 2, size / 2);
        }

        function download(canvas, filename) {
            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                URL.revokeObjectURL(url);
            });
        }

        function download192() {
            const canvas = document.getElementById('canvas192');
            drawIcon(canvas, 192);
            download(canvas, 'pwa-192x192.png');
        }

        function download512() {
            const canvas = document.getElementById('canvas512');
            drawIcon(canvas, 512);
            download(canvas, 'pwa-512x512.png');
        }

        // Draw icons on load
        drawIcon(document.getElementById('canvas192'), 192);
        drawIcon(document.getElementById('canvas512'), 512);
    </script>
</body>
</html>
